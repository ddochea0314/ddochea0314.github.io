점은 브라우저 종료직후가 됩니다.\u003C\u002Fp\u003E\n\u003Cblockquote\u003E\n\u003Cp\u003E브라우저의 모든 탭이 종료되어야 사라집니다.\u003C\u002Fp\u003E\n\u003C\u002Fblockquote\u003E\n\u003Cp\u003E예시) Expires=Sun, 27 Sep 2020 03:43:23 GMT\u003C\u002Fp\u003E\n\u003Ch2 id=\"2-max-age\"\u003E\u003Ca href=\"#2-max-age\" aria-hidden=\"true\"\u003E\u003Cspan class=\"icon icon-link\"\u003E\u003C\u002Fspan\u003E\u003C\u002Fa\u003E2. Max-age\u003C\u002Fh2\u003E\n\u003Cp\u003EExpires와 동일하나, 날짜가 아닌 초단위로 설정합니다. 만약 Expires와 같이 설정될 경우, Max-age값을 따릅니다.\u003C\u002Fp\u003E\n\u003Cp\u003E예시) Max-age=60\u003C\u002Fp\u003E\n\u003Ch2 id=\"3-domain\"\u003E\u003Ca href=\"#3-domain\" aria-hidden=\"true\"\u003E\u003Cspan class=\"icon icon-link\"\u003E\u003C\u002Fspan\u003E\u003C\u002Fa\u003E3. Domain\u003C\u002Fh2\u003E\n\u003Cp\u003E쿠키가 전송될 도메인입니다. 기본값은 현재 도메인입니다.\u003C\u002Fp\u003E\n\u003Ch2 id=\"4-path\"\u003E\u003Ca href=\"#4-path\" aria-hidden=\"true\"\u003E\u003Cspan class=\"icon icon-link\"\u003E\u003C\u002Fspan\u003E\u003C\u002Fa\u003E4. Path\u003C\u002Fh2\u003E\n\u003Cp\u003E쿠키가 전송될 URL입니다. 기본값 \u003Ccode\u003E\u002F\u003C\u002Fcode\u003E이 아닌 특정 URL을 입력하면 해당 URL에서만 사용가능합니다.\u003C\u002Fp\u003E\n\u003Cp\u003E예시) Path=\u002F\u003C\u002Fp\u003E\n\u003Ch2 id=\"5-secure\"\u003E\u003Ca href=\"#5-secure\" aria-hidden=\"true\"\u003E\u003Cspan class=\"icon icon-link\"\u003E\u003C\u002Fspan\u003E\u003C\u002Fa\u003E5. Secure\u003C\u002Fh2\u003E\n\u003Cp\u003Ehttps로 접속했을 때만 사용할 수 있도록 설정합니다.\u003C\u002Fp\u003E\n\u003Ch2 id=\"6-httponly\"\u003E\u003Ca href=\"#6-httponly\" aria-hidden=\"true\"\u003E\u003Cspan class=\"icon icon-link\"\u003E\u003C\u002Fspan\u003E\u003C\u002Fa\u003E6. HttpOnly\u003C\u002Fh2\u003E\n\u003Cp\u003E자바스크립트에선 쿠키를 사용할 수 없도록 설정합니다.\u003C\u002Fp\u003E\n"}}]}}},"context":{}};(function(){var s;(s=document.currentScript||document.scripts[document.scripts.length-1]).parentNode.removeChild(s);}());</script><script src="/assets/js/app.263986a6.js" defer></script><script src="/assets/js/page--src-templates-tag-vue.6
